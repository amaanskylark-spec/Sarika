name: Build Mobile App (Capacitor)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install Capacitor core & android
        run: npm install @capacitor/core @capacitor/android

      - name: Initialize Capacitor (if not done)
        run: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            npx cap init "SarkiaTracker" "com.sarkia.tracker" --web-dir dist
          fi

      - name: Add Android platform (if not present)
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sarkia-tracker-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-ios:
    name: Build iOS (macOS only)
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/ios

      - name: Init and sync Capacitor
        run: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            npx cap init "SarkiaTracker" "com.sarkia.tracker" --web-dir dist
          fi
          if [ ! -d ios ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Build iOS (unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build | xcpretty

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: sarkia-tracker-ios-sim
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 30