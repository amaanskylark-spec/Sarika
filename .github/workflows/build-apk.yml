name: Sarika Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Install Capacitor CLI and Android platform
        run: npm install --no-save @capacitor/cli @capacitor/core @capacitor/android

      - name: Create Android project (if missing)
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle
          cache-dependency-path: |
            android/**/*.gradle*
            android/**/gradle-wrapper.properties
            android/gradle/*.versions.toml

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk